# Базовые переменные

bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next

env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER,vulkan
exec-once = waybar
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = ~/.swaync_start.sh
# Монитор
monitor=,preferred,auto,1
exec-once = hyprpaper
#bind = , Print, exec, grim - | wl-copy

bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
# Раскладка и мышь
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
}

# Общий вид
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(3c6eb4ee) rgba(1a4d8cee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Оформление
decoration {
    rounding = 0
    blur {
        enabled = true
        size = 3
        passes = 2
    }
}
# Анимации
animations {
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    animation = windows, 1, 4, default, popin
    animation = border, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, fade
}
bind = CTRL SHIFT, left, movewindow, l
bind = CTRL SHIFT, right, movewindow, r
bind = CTRL SHIFT, up, movewindow, u
bind = CTRL SHIFT, down, movewindow, d
# Горячие клавиши
bind = SUPER, T, exec, Telegram
bind = ALT, Q, exec, kitty
bind = ALT, C, killactive,
bind = SUPER, M, exit,
bind = SUPER, E, exec, thunar
bind = SUPER, R, exec, rofi -show drun
bind = SUPER, SPACE, exec, rofi -show run
bind = SUPER, F, exec, firefox
# Переключение рабочих столов

bind = SHIFT, 0, workspace, 6

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow
# Перемещение окон по рабочим столам
bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 0, movetoworkspace, 6
# Листаем рабочие столы вперед-назад
bind = CTRL, RIGHT, workspace, e+1
bind = CTRL, LEFT, workspace, e-1
# Переключение раскладки
bind = ALT_SHIFT, SPACE, exec, hyprctl switchxkblayout current next

# Скриншоты
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# Громкость и яркость
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Перезагрузка конфига
bind = SUPER, R, exec, hyprctl reload

bind = SUPER, O, exec, rofi -show drun

#env = GTK_THEME,Kali-Dark
#env = XCURSOR_THEME,Flat-Remix-Dark
#env = XCURSOR_SIZE,24
layerrule {
    name = swaync-control-center
    blur = on
    ignore_alpha = 0.5
}

layerrule {
    name = swaync-notification-window
    blur = on
    ignore_alpha = 0.5
}
render {
    direct_scanout = false
}
misc {
	render_unfocused_fps = 60
}
render {
	direct_scanout = false
}
env = XDG_CURRENT_DESKTOP,Hyprland

# Proxy
